---
# Project source code URL: https://github.com/prometheus/node_exporter

prometheus_device_metrics_exporter_enabled: true

prometheus_device_metrics_exporter_identifier: prometheus-device-metrics-exporter
prometheus_device_metrics_exporter_base_path: "/{{ prometheus_device_metrics_exporter_identifier }}"

# renovate: datasource=docker depName=prom/node-exporter versioning=semver
prometheus_device_metrics_exporter_version: v1.5.0

prometheus_device_metrics_exporter_uid: ""
prometheus_device_metrics_exporter_gid: ""

# The hostname at which Prometheus device metrics exporter is served. You don't need to configure it if you're not exposing this.
prometheus_device_metrics_exporter_hostname: ""

# The path at which Prometheus device metrics exporter is served. You don't need to configure it if you're not exposing this.
# This value must either be `/` or not end with a slash.
prometheus_device_metrics_exporter_path_prefix: "/metrics"

prometheus_device_metrics_exporter_container_image: "{{ prometheus_device_metrics_exporter_container_image_registry_prefix }}rocm/device-metrics-exporter:{{ prometheus_device_metrics_exporter_container_image_tag }}"
prometheus_device_metrics_exporter_container_image_tag: "{{ prometheus_device_metrics_exporter_version }}"
prometheus_device_metrics_exporter_container_image_registry_prefix: "{{ prometheus_device_metrics_exporter_container_image_registry_prefix_upstream }}"
prometheus_device_metrics_exporter_container_image_registry_prefix_upstream: "{{ prometheus_device_metrics_exporter_container_image_registry_prefix_upstream_default }}"
prometheus_device_metrics_exporter_container_image_registry_prefix_upstream_default: "docker.io/"

# The base container network
#
# Official recommendations are to run this container with `--net=host`,
# but we don't do that, since it:
# - exposes the metrics web server way too publicly (we'd potentially like to add HTTP Basic authentication, etc.)
# - or listens on a loopback interface only (--net=host and 127.0.0.1:9100), which is not reachable from a local Prometheus container
#
# Not using `--net=host` means that our network statistic reports are likely broken (inaccurate),
# because node-exporter can't see all interfaces, etc.
# For now, we'll live with that, until someone develops a better solution.
prometheus_device_metrics_exporter_container_network: "{{ prometheus_device_metrics_exporter_identifier }}"

# Control if the container network is deleted on uninstalling.
prometheus_device_metrics_exporter_container_network_deletion_enabled: true

# Specify how the container publishes its HTTP port (as defined by `prometheus_device_metrics_exporter_container_http_port`).
#
# Takes an "<ip>:<port>" or "<port>" value (e.g. "127.0.0.1:9100"), just a port number or empty string to not expose.
prometheus_device_metrics_exporter_container_http_host_bind_port: ""

# The port number in the container
prometheus_device_metrics_exporter_container_http_port: 5000

# A list of additional container networks that the container would be connected to.
# The role does not create these networks, so make sure they already exist.
#
# Use this to expose this container to another reverse proxy, which runs in a different container network,
# without exposing all other container services to that other reverse-proxy.
#
# For background, see: https://github.com/spantaleev/matrix-docker-ansible-deploy/issues/1498
prometheus_device_metrics_exporter_container_additional_networks: "{{ prometheus_device_metrics_exporter_container_additional_networks_auto + prometheus_device_metrics_exporter_container_additional_networks_custom }}"
prometheus_device_metrics_exporter_container_additional_networks_auto: []
prometheus_device_metrics_exporter_container_additional_networks_custom: []

# prometheus_device_metrics_exporter_container_labels_metrics_enabled controls whether labels to assist a Traefik reverse-proxy will be attached to the container.
# See `../templates/labels.j2` for details.
#
# To inject your own other container labels, see `prometheus_device_metrics_exporter_container_labels_additional_labels_custom`.
prometheus_device_metrics_exporter_container_labels_metrics_enabled: false
prometheus_device_metrics_exporter_container_labels_metrics_docker_network: "{{ prometheus_device_metrics_exporter_container_network }}"
prometheus_device_metrics_exporter_container_labels_metrics_hostname: "{{ prometheus_device_metrics_exporter_hostname }}"
# The path prefix must either be `/` or not end with a slash (e.g. `/metrics`).
prometheus_device_metrics_exporter_container_labels_metrics_path_prefix: "{{ prometheus_device_metrics_exporter_path_prefix }}"
prometheus_device_metrics_exporter_container_labels_metrics_rule: "Host(`{{ prometheus_device_metrics_exporter_container_labels_metrics_hostname }}`){% if prometheus_device_metrics_exporter_container_labels_metrics_path_prefix != '/' %} && PathPrefix(`{{ prometheus_device_metrics_exporter_container_labels_metrics_path_prefix }}`){% endif %}"
prometheus_device_metrics_exporter_container_labels_metrics_priority: 0
prometheus_device_metrics_exporter_container_labels_metrics_entrypoints: web-secure
prometheus_device_metrics_exporter_container_labels_metrics_tls: "{{ prometheus_device_metrics_exporter_container_labels_metrics_entrypoints != 'web' }}"
prometheus_device_metrics_exporter_container_labels_metrics_tls_certResolver: default  # noqa var-naming
prometheus_device_metrics_exporter_container_labels_metrics_middleware_basic_auth_enabled: false
# See: https://doc.traefik.io/traefik/reference/routing-configuration/http/middlewares/basicauth/
prometheus_device_metrics_exporter_container_labels_metrics_middleware_basic_auth_users: ""

# prometheus_device_metrics_exporter_container_labels_additional_labels contains a multiline string with additional labels to add to the container label file.
# See `../templates/labels.j2` for details.
# To add your own custom labels, use `prometheus_device_metrics_exporter_container_labels_additional_labels_custom`
#
# Example:
# prometheus_device_metrics_exporter_container_labels_additional_labels_custom:
#   - my.label=1
#   - another.label="here"
prometheus_device_metrics_exporter_container_labels_additional_labels: "{{ prometheus_device_metrics_exporter_container_labels_additional_labels_auto + prometheus_device_metrics_exporter_container_labels_additional_labels_custom }}"
prometheus_device_metrics_exporter_container_labels_additional_labels_auto: []
prometheus_device_metrics_exporter_container_labels_additional_labels_custom: []

# A list of extra arguments to pass to the container (`docker create` command)
prometheus_device_metrics_exporter_container_extra_arguments: "{{ prometheus_device_metrics_exporter_container_extra_arguments_auto + prometheus_device_metrics_exporter_container_extra_arguments_custom }}"
prometheus_device_metrics_exporter_container_extra_arguments_auto: []
prometheus_device_metrics_exporter_container_extra_arguments_custom: []

# Passthrough of GPU device paths and sysfs for device metrics exporter
prometheus_device_metrics_exporter_sys_path: "/sys"
prometheus_device_metrics_exporter_gpu_devices_path: "/dev/dri"
prometheus_device_metrics_exporter_kernel_fusion_path: "/dev/kfd"

# A list of extra arguments to pass to the Prometheus device metrics exporter process
#
# Example:
# prometheus_device_metrics_exporter_process_extra_arguments:
#   - "--collector.systemd"
#   - "--collector.logind"
#
# Note: the above is just an example. Various collectors may require various tweaks to be able to run.
# Running the systemd collector requires the following `prometheus_device_metrics_exporter_process_extra_arguments`:
# - the socket to be mounted as well (`--mount type=bind,src=/var/run/dbus/system_bus_socket,dst=/var/run/dbus/system_bus_socket,ro,bind-propagation=rslave`)
# - (on AppArmor-based distros) disabling AppArmor protection (`--security-opt apparmor=unconfined`)
prometheus_device_metrics_exporter_process_extra_arguments: "{{ prometheus_device_metrics_exporter_process_extra_arguments_auto + prometheus_device_metrics_exporter_process_extra_arguments_custom }}"
prometheus_device_metrics_exporter_process_extra_arguments_auto: []
prometheus_device_metrics_exporter_process_extra_arguments_custom: []

# List of systemd services that the Prometheus device metrics exporter systemd service depends on
prometheus_device_metrics_exporter_systemd_required_services_list: "{{ prometheus_device_metrics_exporter_systemd_required_services_list_default + prometheus_device_metrics_exporter_systemd_required_services_list_auto + prometheus_device_metrics_exporter_systemd_required_services_list_custom }}"
prometheus_device_metrics_exporter_systemd_required_services_list_default: "{{ [devture_systemd_docker_base_docker_service_name] if devture_systemd_docker_base_docker_service_name else [] }}"
prometheus_device_metrics_exporter_systemd_required_services_list_auto: []
prometheus_device_metrics_exporter_systemd_required_services_list_custom: []

# List of systemd services that the Prometheus device metrics exporter systemd service wants
prometheus_device_metrics_exporter_systemd_wanted_services_list: "{{ prometheus_device_metrics_exporter_systemd_wanted_services_list_default + prometheus_device_metrics_exporter_systemd_wanted_services_list_auto + prometheus_device_metrics_exporter_systemd_wanted_services_list_custom }}"
prometheus_device_metrics_exporter_systemd_wanted_services_list_default: []
prometheus_device_metrics_exporter_systemd_wanted_services_list_auto: []
prometheus_device_metrics_exporter_systemd_wanted_services_list_custom: []

# Controls how long to wait for the container to stop gracefully before killing it.
prometheus_device_metrics_exporter_container_stop_grace_time_seconds: "{{ devture_systemd_docker_base_container_stop_grace_time_seconds }}"

# Controls how long the pre-start cleanup should wait for stale container-name release
# before failing startup explicitly.
prometheus_device_metrics_exporter_container_cleanup_timeout_seconds: "{{ devture_systemd_docker_base_container_cleanup_timeout_seconds }}"

# Controls the delay between pre-start cleanup retries.
prometheus_device_metrics_exporter_container_cleanup_retry_delay_seconds: "{{ devture_systemd_docker_base_container_cleanup_retry_delay_seconds }}"

# Shell command used in the systemd pre-start phase to deterministically remove a stale
# container and wait until Docker releases its name.
prometheus_device_metrics_exporter_container_cleanup_command: |
  i=0;
  while [ "$i" -lt {{ prometheus_device_metrics_exporter_container_cleanup_timeout_seconds }} ]; do
  {{ devture_systemd_docker_base_host_command_docker }} stop -t {{ prometheus_device_metrics_exporter_container_stop_grace_time_seconds }} {{ prometheus_device_metrics_exporter_identifier }} >/dev/null 2>&1 || true;
  {{ devture_systemd_docker_base_host_command_docker }} rm -f {{ prometheus_device_metrics_exporter_identifier }} >/dev/null 2>&1 || true;
  if {{ devture_systemd_docker_base_host_command_docker }} container inspect {{ prometheus_device_metrics_exporter_identifier }} >/dev/null 2>&1; then
  i=$((i + 1));
  sleep {{ prometheus_device_metrics_exporter_container_cleanup_retry_delay_seconds }};
  continue;
  fi;
  if {{ devture_systemd_docker_base_host_command_docker }} info >/dev/null 2>&1; then
  exit 0;
  fi;
  echo "Failed to query Docker daemon while cleaning up {{ prometheus_device_metrics_exporter_identifier }}" >&2;
  exit 1;
  done;
  echo "Failed to remove stale container {{ prometheus_device_metrics_exporter_identifier }} after {{ prometheus_device_metrics_exporter_container_cleanup_timeout_seconds }} attempts" >&2;
  exit 1

# prometheus_device_metrics_exporter_dashboard_urls contains a list of URLs with Grafana dashboard definitions for the device metrics exporter.
# This role doesn't make use of this variable, but you can hook this into other roles.
prometheus_device_metrics_exporter_dashboard_urls:
  - https://raw.githubusercontent.com/rfmoz/grafana-dashboards/7998032d1c36ef6452c3a93ab326195a04ac7ebd/prometheus/node-exporter-full.json

# Specify the timezone
prometheus_device_metrics_exporter_environment_variables_tz: UTC

# Additional environment variables.
prometheus_device_metrics_exporter_environment_variables_additional_variables: ""

# prometheus_device_metrics_exporter_restart_necessary controls whether the Prometheus device metrics exporter systemd
# service will be restarted (when true) or merely started (when false) by the
# systemd service manager role (when conditional restart is enabled).
#
# This value is automatically computed during installation based on whether
# any configuration files, the systemd service file, or the container image changed.
# The default of `false` means "no restart needed" — appropriate when the role's
# installation tasks haven't run (e.g., due to --tags skipping them).
prometheus_device_metrics_exporter_restart_necessary: false
