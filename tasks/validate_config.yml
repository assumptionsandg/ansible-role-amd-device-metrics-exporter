---
- name: (Deprecation) Catch and report renamed settings
  ansible.builtin.fail:
    msg: >-
      Your configuration contains a variable, which now has a different name.
      Please change your configuration to rename the variable (`{{ item.old }}` -> `{{ item.new }}`).
  when: "lookup('ansible.builtin.varnames', ('^' + item.old + '$'), wantlist=True) | length > 0"
  with_items:
    - { "old": "prometheus_device_metrics_exporter_server_fqn", "new": "prometheus_device_metrics_exporter_hostname" }
    - { "old": "prometheus_device_metrics_exporter_basicauth_enabled", "new": "prometheus_device_metrics_exporter_container_labels_metrics_middleware_basic_auth_enabled" }
    - "old": "prometheus_device_metrics_exporter_basicauth_user"
      "new": "<superseded by prometheus_device_metrics_exporter_container_labels_metrics_middleware_basic_auth_users>"
    - "old": "prometheus_device_metrics_exporter_basicauth_password"
      "new": "<superseded by prometheus_device_metrics_exporter_container_labels_metrics_middleware_basic_auth_users>"
    - { "old": "prometheus_device_metrics_exporter_basicauth_print", "new": "<removed>" }
    - { "old": "prometheus_device_metrics_exporter_docker_image_name_prefix", "new": "prometheus_device_metrics_exporter_container_image_registry_prefix" }
    - { "old": "prometheus_device_metrics_exporter_docker_image", "new": "prometheus_device_metrics_exporter_container_image" }
    - { "old": "prometheus_device_metrics_exporter_docker_image_registry_prefix", "new": "prometheus_device_metrics_exporter_container_image_registry_prefix" }
    - { "old": "prometheus_device_metrics_exporter_docker_image_registry_prefix_upstream", "new": "prometheus_device_metrics_exporter_container_image_registry_prefix_upstream" }
    - "old": "prometheus_device_metrics_exporter_docker_image_registry_prefix_upstream_default"
      "new": "prometheus_device_metrics_exporter_container_image_registry_prefix_upstream_default"
    - { "old": "prometheus_device_metrics_exporter_docker_image_force_pull", "new": "prometheus_device_metrics_exporter_container_image_force_pull" }
    - { "old": "prometheus_device_metrics_exporter_container_image_force_pull", "new": "<removed> (the new community.docker.docker_image_pull module handles this natively)" }

- name: (Deprecation) Catch and report renamed variables for Traefik labels
  ansible.builtin.fail:
    msg: |-
      Your configuration contains a variable, which now has a different name.
      Please rename all `prometheus_device_metrics_exporter_container_labels_traefik_*` variables to `prometheus_device_metrics_exporter_container_labels_metrics_*` on your configuration file (vars.yml).

      The following variables in your configuration need to be renamed: {{ lookup('ansible.builtin.varnames', '^prometheus_device_metrics_exporter_container_labels_traefik_.+', wantlist=True) | join(', ') }}
  when: "lookup('ansible.builtin.varnames', '^prometheus_device_metrics_exporter_container_labels_traefik_.+', wantlist=True) | length > 0"

- name: Fail if required Prometheus device metrics exporter settings not defined
  ansible.builtin.fail:
    msg: >-
      You need to define a required configuration setting (`{{ item }}`).
  when: "lookup('vars', item, default='') | string | length == 0"
  with_items:
    - prometheus_device_metrics_exporter_uid
    - prometheus_device_metrics_exporter_gid
    - prometheus_device_metrics_exporter_container_network

- name: Run if Traefik is enabled
  when: prometheus_device_metrics_exporter_container_labels_metrics_enabled | bool
  block:
    - name: Fail if Traefik settings required for Prometheus device metrics exporter are not defined
      ansible.builtin.fail:
        msg: >-
          You need to define a required configuration setting (`{{ item }}`).
      when: "lookup('vars', item, default='') | string | length == 0"
      with_items:
        - prometheus_device_metrics_exporter_container_labels_metrics_hostname
        - prometheus_device_metrics_exporter_container_labels_metrics_path_prefix
