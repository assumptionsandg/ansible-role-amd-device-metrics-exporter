---
- name: Perform Prometheus device metrics exporter installation tasks
  when: prometheus_device_metrics_exporter_enabled | bool
  tags:
    - setup-all
    - setup-prometheus-device-metrics-exporter
    - install-all
    - install-prometheus-device-metrics-exporter
  block:
    - name: Validate Prometheus device metrics exporter configuration
      ansible.builtin.include_tasks: "{{ role_path }}/tasks/validate_config.yml"
    - name: Install Prometheus device metrics exporter
      ansible.builtin.include_tasks: "{{ role_path }}/tasks/install.yml"

- name: Perform Prometheus device metrics exporter uninstallation tasks
  when: not prometheus_device_metrics_exporter_enabled | bool
  tags:
    - setup-all
    - setup-prometheus-device-metrics-exporter
  block:
    - name: Uninstall Prometheus device metrics exporter
      ansible.builtin.include_tasks: "{{ role_path }}/tasks/uninstall.yml"
